<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6C5CE7"/>
      <stop offset="100%" stop-color="#a855f7"/>
    </linearGradient>
    <linearGradient id="arrow" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#e0d4fc"/>
    </linearGradient>
  </defs>

  <!-- Rounded square background -->
  <rect x="4" y="4" width="120" height="120" rx="28" ry="28" fill="url(#bg)"/>

  <!-- Subtle inner shadow / shine -->
  <rect x="4" y="4" width="120" height="120" rx="28" ry="28"
        fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="1.5"/>

  <!-- Play triangle (left-center, slightly up) -->
  <path d="M38 36 L38 72 L62 54 Z" fill="url(#arrow)" opacity="0.95"/>

  <!-- Download arrow shaft -->
  <rect x="74" y="32" width="12" height="30" rx="3" fill="url(#arrow)" opacity="0.95"/>

  <!-- Download arrow head (chevron) -->
  <path d="M66 60 L80 76 L94 60" fill="none" stroke="url(#arrow)"
        stroke-width="5" stroke-linecap="round" stroke-linejoin="round" opacity="0.95"/>

  <!-- Base line under arrow -->
  <line x1="66" y1="82" x2="94" y2="82" stroke="url(#arrow)"
        stroke-width="4" stroke-linecap="round" opacity="0.7"/>

  <!-- Bottom text-like accent bar -->
  <rect x="30" y="94" width="68" height="4" rx="2" fill="white" opacity="0.25"/>
</svg>
